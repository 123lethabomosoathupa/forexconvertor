<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Forex — Charts</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 50% 0%, #f3eefa 0%, #faf8fd 50%, #f3eefa 100%);
      font-family: 'Poppins', 'Segoe UI', sans-serif; padding: 30px 20px;
    }
    .page { max-width: 900px; margin: 0 auto; }
    .top-bar { display: flex; justify-content: space-between;
               align-items: center; margin-bottom: 28px; }
    h1 { color: #3f1d61; font-size: 1.8rem; font-weight: 700; }
    .nav-link { color: #5b2c86; text-decoration: none; font-size: 0.9rem;
                border: 1px solid #5b2c86; border-radius: 20px; padding: 6px 14px;
                font-weight: 600; transition: background 0.2s, color 0.2s; }
    .nav-link:hover { background: #5b2c86; color: #fff; }
    .selector-card { background: #ffffff; border-radius: 14px; padding: 20px 24px;
                     border: 1px solid #ece3f8; margin-bottom: 20px;
                     box-shadow: 0 4px 18px rgba(91,44,134,0.06);
                     display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; flex: 1; min-width: 110px; }
    label { color: #6b6478; font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 6px; }
    select { padding: 10px 12px; border-radius: 10px; border: 1px solid #ddd2ef;
             background: #faf8fd; color: #1f1b2e; font-size: 1rem; outline: none; }
    .btn { padding: 10px 24px; background: #5b2c86; color: #fff; border: none;
           border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer;
           transition: background 0.2s; }
    .btn:hover { background: #3f1d61; }
    .chart-card { background: #ffffff; border-radius: 14px; padding: 28px;
                  border: 1px solid #ece3f8; box-shadow: 0 4px 18px rgba(91,44,134,0.06); }
    .chart-title { color: #1f1b2e; font-size: 1rem; margin-bottom: 20px; }
    .chart-title span { color: #5b2c86; font-weight: bold; }
    .empty { color: #b3aac4; text-align: center; padding: 60px; }
    canvas { max-height: 380px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <h1>Rate History</h1>
      <a href="/converter" class="nav-link">Converter</a>
    </div>

    <div class="selector-card">
      <div class="field">
        <label>From</label>
        <select id="fromSelect">
          <option th:each="c : ${currencies}" th:value="${c}" th:text="${c}"></option>
        </select>
      </div>
      <div class="field">
        <label>To</label>
        <select id="toSelect">
          <option th:each="c : ${currencies}" th:value="${c}" th:text="${c}"
                  th:selected="${c == 'ZAR'}"></option>
        </select>
      </div>
      <button class="btn" onclick="loadChart()">Load Chart</button>
    </div>

    <div class="chart-card">
      <p class="chart-title" id="chartTitle">Select a pair and click Load Chart</p>
      <div id="emptyState" class="empty">No data yet — make some conversions first</div>
      <canvas id="rateChart" style="display:none;"></canvas>
    </div>
  </div>

  <script>
    let chart = null;

    async function loadChart() {
      const from = document.getElementById('fromSelect').value;
      const to   = document.getElementById('toSelect').value;

      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('rateChart').style.display  = 'none';
      document.getElementById('chartTitle').innerHTML =
        'Loading <span>' + from + '/' + to + '</span>...';

      const res  = await fetch('/charts/data?from=' + from + '&to=' + to);
      const data = await res.json();

      if (!data.labels || data.labels.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('emptyState').textContent =
          'No conversions for ' + from + '/' + to + ' yet.';
        document.getElementById('chartTitle').textContent = from + '/' + to;
        return;
      }

      document.getElementById('chartTitle').innerHTML =
        '<span>' + from + '/' + to + '</span> — Last ' + data.labels.length + ' conversions';
      document.getElementById('rateChart').style.display = 'block';

      if (chart) chart.destroy();

      chart = new Chart(document.getElementById('rateChart').getContext('2d'), {
        type: 'line',
        data: {
          labels: data.labels,
          datasets: [{
            label: '1 ' + from + ' = ? ' + to,
            data: data.rates,
            borderColor: '#5b2c86',
            backgroundColor: 'rgba(91,44,134,0.07)',
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: '#8b5fbf',
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: '#6b6478' } },
            tooltip: { callbacks: { label: c => '  Rate: ' + c.parsed.y.toFixed(4) } }
          },
          scales: {
            x: { ticks: { color: '#8b85a0', maxTicksLimit: 10 },
                 grid:  { color: 'rgba(139,133,160,0.15)' } },
            y: { ticks: { color: '#8b85a0' },
                 grid:  { color: 'rgba(139,133,160,0.15)' } }
          }
        }
      });
    }
  </script>
</body>
</html>
