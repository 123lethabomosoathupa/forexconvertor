<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Forex Exchange — History</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                min-height: 100vh;
                background: radial-gradient(circle at 50% 0%, #f3eefa 0%, #faf8fd 50%, #f3eefa 100%);
                font-family: 'Poppins', 'Segoe UI', sans-serif;
                padding: 30px 20px;
            }
            .page {
                max-width: 900px;
                margin: 0 auto;
            }
            .top-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 24px;
            }
            h1 {
                color: #3f1d61;
                font-size: 1.8rem;
                font-weight: 700;
            }
            .nav-link {
                color: #5b2c86;
                text-decoration: none;
                font-size: 0.9rem;
                border: 1px solid #5b2c86;
                border-radius: 20px;
                padding: 6px 14px;
                font-weight: 600;
                transition: background 0.2s, color 0.2s;
            }
            .nav-link:hover {
                background: #5b2c86;
                color: #fff;
            }
            .filter-card {
                background: #ffffff;
                border-radius: 14px;
                padding: 20px 24px;
                border: 1px solid #ece3f8;
                box-shadow: 0 4px 18px rgba(91,44,134,0.06);
                margin-bottom: 20px;
                display: flex;
                gap: 12px;
                align-items: flex-end;
                flex-wrap: wrap;
            }
            .field {
                display: flex;
                flex-direction: column;
                flex: 1;
                min-width: 110px;
            }
            label {
                color: #6b6478;
                font-size: 0.78rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                margin-bottom: 6px;
            }
            select {
                padding: 10px 12px;
                border-radius: 10px;
                border: 1px solid #ddd2ef;
                background: #faf8fd;
                color: #1f1b2e;
                font-size: 0.95rem;
                outline: none;
            }
            .filter-btn {
                padding: 10px 20px;
                background: #5b2c86;
                color: #fff;
                border: none;
                border-radius: 10px;
                font-size: 0.95rem;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.2s;
            }
            .filter-btn:hover {
                background: #3f1d61;
            }
            .sparkline-card {
                background: #ffffff;
                border-radius: 14px;
                padding: 20px 24px;
                border: 1px solid #ece3f8;
                box-shadow: 0 4px 18px rgba(91,44,134,0.06);
                margin-bottom: 20px;
            }
            .sparkline-label {
                color: #6b6478;
                font-size: 0.85rem;
                margin-bottom: 8px;
            }
            .sparkline-card img {
                display: block;
                border-radius: 6px;
                border: 1px solid #ddc8f5;
                width: 300px;
                height: 80px;
            }
            .table-card {
                background: #ffffff;
                border-radius: 14px;
                border: 1px solid #ece3f8;
                box-shadow: 0 4px 18px rgba(91,44,134,0.06);
                overflow: hidden;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th {
                background: #f3eefa;
                color: #5b2c86;
                padding: 12px 16px;
                text-align: left;
                font-size: 0.82rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            td {
                padding: 12px 16px;
                color: #1f1b2e;
                font-size: 0.92rem;
                border-bottom: 1px solid #ece3f8;
            }
            tr:last-child td {
                border-bottom: none;
            }
            tr:hover td {
                background: #faf5ff;
            }
            .empty {
                color: #b3aac4;
                text-align: center;
                padding: 40px;
            }
        </style>
    </head>
    <body>
        <div class="page">
            <div class="top-bar">
                <h1>Conversion History</h1>
                <a href="/converter" class="nav-link">Converter</a>
            </div>
            <!-- Filter by pair -->
            <form method="get" th:action="@{/history/pair}" class="filter-card">
                <div class="field">
                    <label>From</label>
                    <select name="from">
                        <option th:each="c : ${currencies}"
                                th:value="${c}" th:text="${c}"
                                th:selected="${c == selectedFrom}"></option>
                    </select>
                </div>
                <div class="field">
                    <label>To</label>
                    <select name="to">
                        <option th:each="c : ${currencies}"
                                th:value="${c}" th:text="${c}"
                                th:selected="${c == selectedTo}"></option>
                    </select>
                </div>
                <button type="submit" class="filter-btn">Filter</button>
                <a href="/history" class="filter-btn"
                   style="text-decoration:none; background:#8b85a0;">All</a>
            </form>
            <!-- Sparkline for filtered pair -->
            <div class="sparkline-card" th:if="${showSparkline != null and showSparkline and selectedFrom != null}">
                <p class="sparkline-label">
                    Rate trend —
                    <span th:text="${selectedFrom}"></span>/
                    <span th:text="${selectedTo}"></span>
                    (last 30 conversions)
                </p>
                <img th:src="@{/sparkline(from=${selectedFrom},to=${selectedTo})}"
                     alt="Rate sparkline">
            </div>
            <!-- History table -->
            <div class="table-card">
                <table th:if="${logs != null and !#lists.isEmpty(logs)}">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>From</th>
                            <th>To</th>
                            <th>Amount</th>
                            <th>Rate</th>
                            <th>Converted</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="log : ${logs}">
                            <td th:text="${log.id}"></td>
                            <td th:text="${log.fromCurrency}"></td>
                            <td th:text="${log.toCurrency}"></td>
                            <td th:text="${log.amount}"></td>
                            <td th:text="${log.rate}"></td>
                            <td th:text="${log.convertedAmount}"></td>
                            <td th:text="${log.formattedTime}"></td>
                        </tr>
                    </tbody>
                </table>
                <p th:if="${logs == null or #lists.isEmpty(logs)}" class="empty">
                    No conversions yet. Go make one!
                </p>
            </div>
        </div>
    </body>
</html>
